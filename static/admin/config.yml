backend:
  name: github
  repo: rainbowforgedev/seb.eschenbach
  branch: main



# Local development mode — starts with: npx @sveltia/cms-proxy-server
local_backend: false


media_folder: static/uploads
public_folder: /uploads

collections:



  - name: works
    label: works
    label_singular: works
    folder: src/content/works
    create: true
    delete: true
    slug: "{{slug}}"
    extension: md
    format: yaml-frontmatter
    fields:









      - { label: Title, name: title, widget: string }
      - { label: Slug, name: slug, widget: string, hint: "URL-friendly name, e.g., bei-gerswalde" }
      - { label: Year, name: year, widget: number, value_type: int }
      - { label: Technique, name: technique, widget: string, hint: "e.g., Oil on canvas" }
      - { label: Dimensions, name: dimensions, widget: string, hint: "e.g., 40 × 60 cm" }
      - { label: Image, name: image, widget: image, hint: "Please convert to WebP and resize to max. 1600px width before uploading (e.g., squoosh.app). Max. 500 KB." }
      - { label: Status, name: status, widget: string, required: false, hint: "e.g., Available, Sold, Reserved" }
      - { label: Price, name: price, widget: string, required: false, hint: "e.g., 1,200 €" }
      - { label: Description, name: body, widget: markdown, required: false }




  - name: exhibitions
    label: Exhibitions
    label_singular: Exhibition
    folder: src/content/exhibitions
    create: true
    delete: true
    slug: "{{slug}}"
    extension: md
    format: yaml-frontmatter
    fields:

      - { label: Title, name: title, widget: string }
      - { label: Slug, name: slug, widget: string }





      - { label: Location, name: location, widget: string }
      - { label: From, name: dateFrom, widget: string, hint: "e.g., May 1, 2026" }
      - { label: To, name: dateTo, widget: string, hint: "e.g., June 27, 2026" }
      - { label: Image, name: image, widget: image, hint: "Please convert to WebP and resize to max. 1600px width before uploading (e.g., squoosh.app). Max. 500 KB." }
      - label: Orientation
        name: orientation
        widget: select
        options:


          - { label: Landscape, value: landscape }
          - { label: Portrait, value: portrait }
        default: landscape


      - { label: Is Current Exhibition, name: isCurrent, widget: boolean, default: false }
      - { label: Description, name: body, widget: markdown }

  - name: pages

    label: Pages
    files:
      - name: about_page

        label: about Page
        file: src/content/pages/about.md
        format: yaml-frontmatter
        fields:



          - { label: Portrait Image, name: portrait, widget: image, hint: "Please convert to WebP before uploading (e.g., squoosh.app). Max. 500 KB." }
          - { label: Press Image, name: pressImage, widget: image, hint: "Please convert to WebP before uploading (e.g., squoosh.app). Max. 500 KB." }
          - { label: Biography, name: body, widget: markdown }
      - name: contact_page

        label: Contact Page
        file: src/content/pages/contact.md
        format: yaml-frontmatter
        fields:
          - { label: Name, name: name, widget: string }
          - { label: 'E-Mail', name: email, widget: string }


          - { label: Phone, name: phone, widget: string }
          - label: Address Lines
            name: address
            widget: list


            hint: "Lines for the postcard address"
          - { label: Hint Text, name: hint, widget: string }

  - name: about
    label: about

    label_singular: about Entry
    folder: src/content/about
    create: true
    delete: true
    slug: "{{year}}-{{slug}}"
    extension: md
    format: yaml-frontmatter
    fields:



      - { label: Year, name: year, widget: string, hint: "e.g., 2023 or 1980–1985" }
      - { label: Title, name: title, widget: string }
      - label: Category
        name: category
        widget: select
        options:






          - { label: Education, value: ausbildung }
          - { label: Exhibition, value: ausstellung }
          - { label: Price, value: preis }
          - { label: Other, value: sonstiges }
      - { label: Description, name: body, widget: markdown, required: false }

