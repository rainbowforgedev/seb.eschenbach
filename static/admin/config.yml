backend:
  name: github
  repo: eschencode/seb.eschenbach
  branch: main
  base_url: https://sveltia-cms-auth.linuseschenbach.workers.dev


# Lokaler Entwicklungsmodus — startet mit: npx @sveltia/cms-proxy-server
local_backend: false


media_folder: static/uploads
public_folder: /uploads

collections:
  - name: werke
    label: Werke
    label_singular: Werk
    folder: src/content/werke
    create: true
    delete: true
    slug: "{{slug}}"
    extension: md
    format: yaml-frontmatter
    fields:
      - { label: Titel, name: title, widget: string }
      - { label: Slug, name: slug, widget: string, hint: "URL-freundlicher Name, z.B. bei-gerswalde" }
      - { label: Jahr, name: year, widget: number, value_type: int }
      - { label: Technik, name: technique, widget: string, hint: "z.B. Öl auf Leinwand" }
      - { label: Maße, name: dimensions, widget: string, hint: "z.B. 40 × 60 cm" }
      - { label: Bild, name: image, widget: image }
      - { label: Status, name: status, widget: string, required: false, hint: "z.B. Verfügbar, Verkauft, Reserviert" }
      - { label: Preis, name: price, widget: string, required: false, hint: "z.B. 1.200 €" }
      - { label: Beschreibung, name: body, widget: markdown, required: false }

  - name: ausstellungen
    label: Ausstellungen
    label_singular: Ausstellung
    folder: src/content/ausstellungen
    create: true
    delete: true
    slug: "{{slug}}"
    extension: md
    format: yaml-frontmatter
    fields:
      - { label: Titel, name: title, widget: string }
      - { label: Slug, name: slug, widget: string }
      - { label: Ort, name: location, widget: string }
      - { label: Von, name: dateFrom, widget: string, hint: "z.B. 1. Mai 2026" }
      - { label: Bis, name: dateTo, widget: string, hint: "z.B. 27. Juni 2026" }
      - { label: Bild, name: image, widget: image }
      - label: Ausrichtung
        name: orientation
        widget: select
        options:
          - { label: Querformat, value: landscape }
          - { label: Hochformat, value: portrait }
        default: landscape
      - { label: Aktuelle Ausstellung, name: isCurrent, widget: boolean, default: false }
      - { label: Beschreibung, name: body, widget: markdown }

  - name: pages
    label: Seiten
    files:
      - name: vita_page
        label: Vita Seite
        file: src/content/pages/vita.md
        format: yaml-frontmatter
        fields:
          - { label: Portraitbild, name: portrait, widget: image }
          - { label: Pressebild, name: pressImage, widget: image }
          - { label: Biografie, name: body, widget: markdown }
      - name: kontakt_page
        label: Kontakt Seite
        file: src/content/pages/kontakt.md
        format: yaml-frontmatter
        fields:
          - { label: Name, name: name, widget: string }
          - { label: 'E-Mail', name: email, widget: string }
          - { label: Telefon, name: phone, widget: string }
          - label: Adresszeilen
            name: address
            widget: list
            hint: "Zeilen für die Postkarten-Adresse"
          - { label: Hinweistext, name: hint, widget: string }

  - name: vita
    label: Vita
    label_singular: Vita-Eintrag
    folder: src/content/vita
    create: true
    delete: true
    slug: "{{year}}-{{slug}}"
    extension: md
    format: yaml-frontmatter
    fields:
      - { label: Jahr, name: year, widget: string, hint: "z.B. 2023 oder 1980–1985" }
      - { label: Titel, name: title, widget: string }
      - label: Kategorie
        name: category
        widget: select
        options:
          - { label: Ausbildung, value: ausbildung }
          - { label: Ausstellung, value: ausstellung }
          - { label: Preis, value: preis }
          - { label: Sonstiges, value: sonstiges }
      - { label: Beschreibung, name: body, widget: markdown, required: false }
